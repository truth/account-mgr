name: docker-deploy

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    env:
      # CI-only build/test variables. Do NOT reuse production DATABASE_URL here.
      DATABASE_URL: mysql://ci:ci@127.0.0.1:3306/account_mgr_ci
      APP_SECRET: ci-app-secret-32-characters-minimum
      MASTER_KEY: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
      SESSION_COOKIE_NAME: account_mgr_session
      SESSION_TTL_HOURS: 24
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: change-this-password
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Build application
        run: npm run build

      - name: Build Docker image
        run: docker build -t account-mgr:test .

  docker-publish:
    if: github.event_name != 'pull_request'
    needs: test-and-build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/account-mgr
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  migrate:
    if: github.event_name != 'pull_request'
    needs: docker-publish
    runs-on: ubuntu-latest
    environment: production
    env:
      # Production migration uses GitHub environment secrets, not image build args.
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      APP_SECRET: ${{ secrets.APP_SECRET }}
      MASTER_KEY: ${{ secrets.MASTER_KEY }}
      SESSION_COOKIE_NAME: account_mgr_session
      SESSION_TTL_HOURS: 24
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: change-this-password
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply Prisma migrations
        run: npx prisma migrate deploy

  deploy:
    if: github.event_name != 'pull_request'
    needs: migrate
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          source: deploy/compose.production.yml
          target: /opt/account-mgr
          strip_components: 1

      - name: Verify required runtime env file exists on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            test -f /opt/account-mgr/.env.production

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/account-mgr:sha-${{ github.sha }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          envs: IMAGE_NAME
          script: |
            mkdir -p /opt/account-mgr
            echo "IMAGE_NAME=${IMAGE_NAME}" > /opt/account-mgr/.deploy.env
            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
            # Runtime variables such as DATABASE_URL are injected from /opt/account-mgr/.env.production.
            docker compose --env-file /opt/account-mgr/.deploy.env -f /opt/account-mgr/compose.production.yml pull
            docker compose --env-file /opt/account-mgr/.deploy.env -f /opt/account-mgr/compose.production.yml up -d --remove-orphans
            docker inspect account-mgr --format='{{.State.Running}}'
